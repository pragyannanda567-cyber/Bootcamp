<script>
    var count=10;
    promise= new Promise((resolve,reject)=>{
        if (count < 0){
            return reject('Negative count')
        }
        else{
            return resolve('Positive Count')
        }
    })

    promise.then((res)=>{
        console.log('Resolved State',res);
        
    })
    promise.catch((res)=>{
        console.log('Rejected State',res);
    })
</script>
