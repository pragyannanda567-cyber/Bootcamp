<!DOCTYPE html>
<html>
<head>
	<title>Registration</title>
</head>
<body>
	<input type="text" name="name" id="name">
	<select id="gender">
		<option value="">--</option>
		<option value="male">M</option>
		<option value="female">F</option>
	</select>
	<input type="text" name="email" id="email">
	<input type="text" name="mobile" id="mobile">
	<hr>
	<h1 id="dName">NAME</h1>
	<h2 id="dGender">GENDER</h2>
	<h3 id="dEmail">EMAIL</h3>
	<h4 id="dMobile">MOBILE</h4>
	<hr>
	<button onclick="showName()">NAME</button>
	<button onclick="showGender()">GENDER</button>
	<button onclick="showEmail()">EMAIL</button>
	<button onclick="showMobile()">MOBILE</button>
	<button onclick="resetForm()">RESET FORM</button>
	<button onclick="resetDisplay()">RESET DISPLAY</button>
	<script type="text/javascript">
		function showName() {
			// Show filled name inside h1
           const ip=document.getElementById('name');
           const dName=document.getElementById('dName');
           dName.innerText=ip.value;

            
		}

		function showGender() {
			// Show the selected gender inside h2
            const gender = document.getElementById('gender');
            const dGender = document.getElementById('dGender');
            dGender.innerText=gender.value;
		}

		function showEmail() {
			// Show the filled email inside h3
           const email=document.getElementById('email');
           const dEmail=document.getElementById('dEmail');
           dEmail.innerText=email.value;
		}

		function showMobile() {
			// Show the filled mobile inside h4
           const mobile =document.getElementById('mobile');
           const dMobile=document.getElementById('dMobile');
           dMobile.innerText=mobile.value;
		}

		function resetForm() {
			// Reset all the form elements to default values (blank "")
            document.getElementById('name').value='';
            document.getElementById('gender').value='';
            document.getElementById('email').value='';
            document.getElementById('mobile').value='';



		}

		function resetDisplay() {
			// Reset all the headings (h1, h2, h3, h4) to blank values
            dName.innerText='NAME'
            dGender.innerText='GENDER'
            dEmail.innerText='EMAIL'
            dMobile.innerText='MOBILE'
		}
	</script>
</body>
</html>
