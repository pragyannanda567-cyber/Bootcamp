<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors</title>
</head>
<body>
    <div>I am A box</div>
    <h1>Hello From heading 1</h1>
    <h2 id="para2">Hello From heading 2</h2>
    <h3 class="w1">Hello From heading 3</h3>
    <p>Hello from p</p>
    <div>
        <span>hello</span><span class="w1">world</span>
    </div>
</body>
</html>

<style>
    h3{
        background-color: yellow;
    }
    #para2{
        color: red;
    }
    .w1{
        text-decoration: underline;

    }
    div,p,#para2{
        
        border: 1px solid teal;
    }
    *{
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;

    }
</style>
