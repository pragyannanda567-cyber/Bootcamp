<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combinators</title>
</head>
<body>
    <div>
        <h1>1</h1>
        <h2>2</h2>
        <div>
            <p>5</p>
            <p>50</p>
            <p>500</p>
        </div>
        <div>
            <span>3</span>
            <p>4</p>
            <div>
                <p>5</p>
                <h3 id="One">6</h3>
            </div>
        </div>
    </div>
    <div>
        <span>7</span>
    <p>8</p>
    <p class="two">9</p>
    </div>
</body>
</html>

<style>
    .two{
        background-color: red;
    }
    div>div>div>p{
        background-color: green;
    }
    div>p+p+p{
        border: solid red;
    }
</style>
