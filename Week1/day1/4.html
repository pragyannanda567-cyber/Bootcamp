<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>
<body>
    <table border="1" cellspacing="0" cellpadding="10" >
        <thead>
            <tr>
                <th>SNo</th>
                <th>Name</th>
                <th>Age</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Pragyan</td>
                <td>18</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Ananta</td>
                <td>18</td>
            </tr>
            <tr>
                <td rowspan="2">3</td>
                <td colspan="2">Chintu</td>
               
            </tr>
            <tr>
                <td>Mintu</td>
                <td>20</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
