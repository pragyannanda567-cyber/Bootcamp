<!DOCTYPE html>
<html>
<head>
    <title>Weekly Schedule</title>
</head>

<body>

<div>
    <h1>Weekly Schedule</h1>

    <table border="1" cellspacing="0" cellpadding="10" >
        <tr>
            <th>Time</th>
            <th>Monday</th>
            <th>Tuesday</th>
            <th>Wednesday</th>
            <th>Thursday</th>
            <th>Friday</th>
        </tr>

        <tr>
            <td rowspan="2" class="left">Morning</td>

            <td>Math</td>

            <td rowspan="2" colspan="2">
                Science Lab
            </td>

            <td>History</td>

            <td>English</td>
        </tr>

        <tr>
            <td>Physics</td>

            <td>Geography</td>

            <td>Sports</td>
        </tr>

        <tr>
            <td class="left">Afternoon</td>

            <td colspan="5" class="left">
                Lunch Break
            </td>
        </tr>

        <tr>
            <td class="left">Evening</td>

            <td>Computer Science</td>

            <td>Art</td>

            <td rowspan="2">Music</td>

            <td>Drama</td>

            <td>Free Period</td>
        </tr>

        <tr>
            <td class="left">Late Evening</td>

            <td colspan="2">Self Study</td>

            <td>Debate</td>

            <td>Sports</td>
        </tr>

    </table>
</div>

</body>
</html>
