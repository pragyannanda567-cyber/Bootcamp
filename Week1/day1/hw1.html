<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
</head>
<body>

<center>
    <form action="">
        <h1>College Event Registration📝</h1>
        <label for="name">Your Name:</label>
        <input type="text" id="name">
        <br><br>
        <label for="email">Email:</label>
        <input type="text" id="email">
        <br><br>
        <label for="age">Age:</label>
        <input type="text" id="age">
        <br><br>
        <label for="sel">Select Event Category:</label>
        <br>
        <label for="CH">Coding Hackathon💻</label>
        <input type="checkbox"id="CH" name="sel">
        <br>
        <label for="DC">Debate Competion🎤</label>
        <input type="checkbox"id="DC" name="sel">
        <br>
        <label for="ST">Sprts Tournament🏐</label>
        <input type="checkbox"id="ST" name="sel">
        <br><br>
        <label for="date">Event Date:</label>
        <input type="date" id="date">
        <br><br>
        <label for="time">Preffered Time Slot:</label>
        <input type="time" id="time">
        <br><br>
        <input type="button" value="Register Now">
    </form>
</center>

</body>
</html>
