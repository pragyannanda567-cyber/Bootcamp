<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms in HTML</title>
</head>
<body>
    <center>
        <form action="">
        <label for="hello">Name:</label>
        <input type="text" placeholder="Enter Your Name" id="hello" name="Name" required>
        <br><br>
        <label for="">Email:</label>
        <input type="email" name="email" id="email" placeholder="Enter Your Email" required>
        <br><br>
        <label for="">Password:</label>
        <input type="password" name="password" id="password" placeholder="Enter Your Password" required>
        <br><br>
        <label for="age">Age</label>
        <input type="text"id='age' placeholder="Enter Yor age">
        <br><br>
        <label for="dob">DOB</label>
        <input type="date" id="dob">
        <br><br>
        <label for="gender">Gender:</label>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender">
        <label for="female">female</label>
        <input type="radio" id="female" name="gender">
        <br><br>
        <label for="">Language:</label>
        <label for="hindi">Hindi</label>
        <input type="checkbox" id="hindi">
        <label for="eng">English</label>
        <input type="checkbox" id="eng>
        <label for="html">HTML</label>
        <input type="checkbox" id="html">
        <br><br>
        <label for="course">Course</label>
        <select name="Course" id="course" placeholder="Course">
            <option value="B.Tech">B.Tech</option>
            <option value="BCA">BCA</option>
            <option value="BBA">BBA</option>

        </select>
        <br><br>
        <label for="Summary">Summary</label>
        <input type="textarea">
        <br><br>
        <input type="submit">
        <input type="reset">

    </form>
    </center>
</body>
</html>
