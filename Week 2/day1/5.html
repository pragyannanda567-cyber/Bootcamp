<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply CSS via JS</title>
</head>
<body>
    <h1 id="head">Hello World</h1>
</body>
</html>

<script>
    //Step 1 Catch/select
    const el = document.getElementById('head');

    //Step 2 Apply CSS
    el.style.color='teal'
    el.style.backgroundColor='pink'
    el.style.fontSize = '40px'

</script>
