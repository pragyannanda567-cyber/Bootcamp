<!DOCTYPE html>
<html>

<head>
    <title>BMI Calculator</title>
</head>

<body>

    <h1>Check your BMI</h1>

    <p>
        Enter your weight and height below to check your BMI results
    </p>

    <p>
        Put your weight in here (Kg)
    </p>

    <input type="number" id="w">

    <br><br>

    <p>
        And your height in here (Cm)
    </p>

    <input type="number" id="h">

    <br><br>

    <button onclick="BMI()">Calculate BMI</button>

    <p id="res">
        Your BMI Results will appear here
    </p>

</body>

</html>
<script>
    function BMI(){
        const a = document.getElementById('w').value;
        const b= document.getElementById('h').value
        var w = Number(a);
        var h = Number(b);

        
        var res = document.getElementById('res')
        var BMI = (w) / (h * h);
        res.innerText=`Your BMI is ${BMI}`;
    }

</script>
