<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slideshow</title>

    <style>
        body{
            text-align:center;
            font-family:Arial;
        }

        .container{
            width:700px;
            margin:auto;
        }

        img{
            width:100%;
            height:400px;
            object-fit:cover;
            border-radius:10px;
        }

        .buttons{
            margin-top:20px;
        }

        button{
            padding:10px 20px;
            margin:10px;
            cursor:pointer;
        }
    </style>

</head>

<body>

<h1>Image Slideshow</h1>

<div class="container">

    <img id="slider">

    <div class="buttons">
        <button id="toggle">Stop Slideshow</button>

        <br><br>

        <button id="prev">Previous</button>
        <button id="next">Next</button>
    </div>

</div>

<script>

    let images = [];

    for(let i=1;i<=20;i++){
            images.push(`https://picsum.photos/700/400?random=${i}`);
    }

    let current = 0;
    let slider =document.getElementById("slider");
    let toggle =document.getElementById("toggle");
    let next =document.getElementById("next");
    let prev =document.getElementById("prev");
    slider.src = images[current];

    function showSlide(){
        current++;

        if(current>=images.length){
            current=0;
        }

        slider.src=images[current];
    }

    let interval =setInterval(showSlide,2000);

    let running=true;

    toggle.addEventListener("click",function(){
        if(running){
            clearInterval(interval);
            toggle.innerText ="Start Slideshow";
            running=false;
        }else{
            interval=setInterval(showSlide,2000);
            toggle.innerText="Stop Slideshow";
            running=true;
        }

    }
    );

    function stopAuto(){
    clearInterval(interval);
    running=false;
    toggle.innerText="Start Slideshow";}
    // next
    next.addEventListener("click",function(){
            stopAuto();
            current++;
            if(current>=images.length){
                current=0;
            }
            slider.src=images[current];
        }
        );


    prev.addEventListener(
    "click",
    function(){
        stopAuto();
        current--;
        if(current<0){
            current=images.length-1;
        }
        slider.src=images[current];
    }
    );

</script>

</body>
</html>
